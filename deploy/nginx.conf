# Westview Science Olympiad — nginx site config
# Place at /etc/nginx/sites-available/westview-scioly and symlink into sites-enabled.

server {
    listen 80;
    listen [::]:80;

    server_name _;            # replace with yourdomain.com www.yourdomain.com

    root /var/www/westview-scioly;
    index index.html;

    # gzip
    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 256;

    # SPA-ish single page: fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for static assets
    location ~* \.(?:css|js|svg|woff2?|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Don't cache the HTML so content updates show immediately
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Basic security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
